<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="robots" content="noindex, nofollow" />
<title>BulBul — A Passport to Us</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>

<div class="vignette"></div>
<div class="grain"></div>
<div class="passport-frame" aria-hidden="true"></div>

<div class="page-label" id="pageLabel" aria-hidden="true"></div>

<section id="cover">
  <div class="cover-inner">
    <span class="label cover-eyebrow" id="c-eyebrow"></span>
    <h1 class="cover-title" id="c-names"></h1>
    <p class="cover-sub" id="c-subtitle"></p>
    <button class="seal-btn" id="openBtn" aria-label="Open the passport">Tap to<br/>open</button>
  </div>
</section>

<div class="pages" id="pages">

  <section class="page" id="bio" data-title="00 · Bio Data">
    <div class="chapter-head reveal">
      <span class="label chapter-num">00 · Bio Data</span>
      <h2 class="chapter-title">Particulars of the holder</h2>
    </div>
    <div class="chapter-body reveal">
      <div class="biopage">
        <div class="bio-top">
          <div class="bio-photo" id="bio-photo">
            <svg viewBox="0 0 120 120" class="bio-bird" aria-hidden="true">
              <path d="M33 88 Q28 62 44 47 Q39 36 49 29 Q54 21 63 25 Q60 30 64 33 Q77 29 88 40 Q80 43 75 47 Q84 53 83 64 Q70 56 59 59 Q66 70 61 82 Q54 71 47 73 Q45 82 33 88 Z"/>
              <circle cx="60" cy="34" r="2.6"/>
            </svg>
          </div>
          <div class="bio-namebox">
            <div class="label bio-field-label">Given Names</div>
            <div class="bio-name" id="bio-name"></div>
            <div class="bio-passportno-wrap">
              <span class="label bio-field-label">Passport No.</span>
              <span class="bio-passportno" id="bio-passportno"></span>
            </div>
          </div>
        </div>
        <div class="bio-fields" id="bio-fields"></div>
        <div class="bio-sign">
          <div class="bio-sig-script" id="bio-sig-name"></div>
          <div class="label bio-sig-label" id="bio-sig-label"></div>
        </div>
        <div class="bio-mrz">
          <div id="bio-mrz1"></div>
          <div id="bio-mrz2"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="page" id="origin" data-title="01 · Origin">
    <div class="chapter-head reveal">
      <span class="label chapter-num">01 · Origin</span>
      <h2 class="chapter-title" id="origin-title"></h2>
    </div>
    <div class="chapter-body reveal">
      <p id="origin-body"></p>
      <div class="stat-row" id="origin-stats"></div>
    </div>
  </section>

  <section class="page" id="distance" data-title="02 · Distance" style="--ink-color:var(--aurora-bright)">
    <div class="stamp reveal" id="distance-stamp"></div>
    <div class="chapter-head reveal">
      <span class="label chapter-num">02 · Distance</span>
      <h2 class="chapter-title" id="distance-title"></h2>
    </div>
    <div class="chapter-body reveal">
      <p class="coords" id="distance-coords"></p>
      <div class="route-map" id="route-map"></div>
      <p style="text-align:center; color:var(--text-ink-dim); margin-bottom:2rem;" id="distance-intro"></p>
      <div class="postcards" id="postcards"></div>
    </div>
  </section>

  <section class="page" id="union" data-title="03 · Union" style="--ink-color:var(--maroon)">
    <div class="stamp reveal" id="union-stamp"></div>
    <div class="chapter-head reveal">
      <span class="label chapter-num">03 · Union</span>
      <h2 class="chapter-title" id="union-title"></h2>
    </div>
    <div class="chapter-body reveal">
      <div class="union-row" id="union-row"></div>
    </div>
  </section>

  <section class="page" id="home" data-title="04 · Home">
    <div class="chapter-head reveal">
      <span class="label chapter-num">04 · Home</span>
      <h2 class="chapter-title" id="home-title"></h2>
    </div>
    <div class="chapter-body card reveal">
      <div class="tv-scene">
        <div class="tv"><div class="tv-label" id="tv-label"></div></div>
        <div class="plates" id="plates"></div>
      </div>
      <p style="text-align:center; color:var(--text-ink-dim);" id="home-body"></p>
    </div>
  </section>

  <section class="page" id="her" data-title="05 · Her">
    <div class="chapter-head reveal">
      <span class="label chapter-num">05 · Her</span>
      <h2 class="chapter-title" id="her-title"></h2>
    </div>
    <div class="chapter-body card reveal">
      <div class="her-grid" id="her-grid"></div>
    </div>
  </section>

  <section class="page" id="future" data-title="06 · Future">
    <div class="chapter-head reveal">
      <span class="label chapter-num">06 · Future</span>
      <h2 class="chapter-title" id="future-title"></h2>
    </div>
    <div class="chapter-body card reveal">
      <canvas class="aurora-canvas" id="auroraCanvas" aria-hidden="true"></canvas>
      <p class="future-quote" id="future-quote"></p>
      <p class="future-sign label" style="color:var(--aurora-bright);" id="future-status"></p>
    </div>
  </section>

  <section class="page" id="promises" data-title="07 · Promises" style="--ink-color:var(--gold-bright)">
    <div class="chapter-head reveal">
      <span class="label chapter-num">07 · Promises</span>
      <h2 class="chapter-title" id="promises-title"></h2>
    </div>
    <div class="chapter-body reveal">
      <div class="promise-grid" id="promise-grid"></div>
    </div>
  </section>

  <section class="page" id="letter" data-title="08 · Letter">
    <div class="chapter-head reveal">
      <span class="label chapter-num">08 · Letter</span>
      <h2 class="chapter-title" id="letter-title"></h2>
    </div>
    <div class="chapter-body reveal">
      <div class="letter-text" id="letter-body">
        <div class="letter-sign">
          <div>
            <div class="label" style="color:var(--text-paper-dim);" id="letter-signoff-label"></div>
            <div style="font-size:1.2rem;" id="letter-signoff-name"></div>
          </div>
          <div class="monogram" id="letter-monogram"></div>
        </div>
      </div>
    </div>
  </section>

  <section class="page" id="finale" data-title="09 · Finale">
    <div class="finale-card card">
      <div class="finale-stamp reveal" id="finale-stamp"></div>
      <h2 class="finale-title reveal" id="finale-title"></h2>
      <div class="finale-counters reveal">
        <div><b id="daysMarried">–</b><span>days married</span></div>
        <div><b id="bdayCount">–</b><span id="bdayLabel">&nbsp;</span></div>
        <div><b id="finale-km"></b><span>km once between us</span></div>
      </div>
      <p class="finale-foot" id="finale-footer"></p>
    </div>
  </section>

</div>

<nav class="pagedock" id="pagedock" aria-label="Passport pages">
  <button class="pd-arrow" id="prevPage" aria-label="Previous page">‹</button>
  <div class="pd-dots" id="pdDots"></div>
  <button class="pd-arrow" id="nextPage" aria-label="Next page">›</button>
</nav>

<script src="content.js"></script>
<script src="script.js"></script>
</body>
</html>
